name: Generate Release Keystore (one-shot)

# Workflow de uso unico: gera o keystore de release no runner (que tem keytool)
# e o publica como ARTIFACT protegido (nao vai pro log). Baixe o artifact, guarde
# o .jks num backup, e configure o secret KEYSTORE_BASE64 a partir dele.
# Depois de usar, este arquivo deve ser removido.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gen-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "::error::Defina os secrets KEYSTORE_PASSWORD, KEY_PASSWORD e KEY_ALIAS antes de rodar."
            exit 1
          fi
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=OpenMonetis Companion, OU=Mobile, O=Control-Finances, L=NA, ST=NA, C=BR"
          # sanity: consegue ler a chave de volta com a senha informada
          keytool -list -keystore keystore.jks -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" >/dev/null
          echo "Keystore gerado e validado."

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: keystore.jks
          retention-days: 1
          if-no-files-found: error
